name: Actualizar Inventario Diario

on:
  schedule:
    - cron: '0 0 * * *' # Ejecutar todos los días a las 00:00 UTC
  workflow_dispatch: # Permitir ejecución manual desde la pestaña Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4

      - name: Ejecutar Scraper
        run: python scraper.py

      - name: Commit y Push de cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/productos.json
          git commit -m "🤖 Actualización automática de precios e inventario [skip ci]" || echo "No hay cambios para commit"
          git push
